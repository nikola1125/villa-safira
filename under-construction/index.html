<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Safira – Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@200;300;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #D4AF37;
      --gold-dim: rgba(212,175,55,0.18);
      --bg: #080808;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Canvas particles ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Radial glow ── */
    .glow {
      position: fixed;
      width: 700px; height: 700px;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 1;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { opacity: .6; transform: translate(-50%,-50%) scale(1); }
      to   { opacity: 1;  transform: translate(-50%,-50%) scale(1.15); }
    }

    /* ── Main wrapper ── */
    .wrap {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* ── Medallion logo ── */
    .medallion {
      position: relative;
      width: 120px; height: 120px;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp .8s .1s ease forwards;
    }
    .medallion img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      filter: brightness(.9) contrast(1.05) saturate(.85);
    }
    /* spinning gold ring */
    .medallion::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: var(--gold);
      border-right-color: rgba(212,175,55,.3);
      animation: spinRing 8s linear infinite;
    }
    .medallion::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(212,175,55,.2);
      border-left-color: var(--gold);
      animation: spinRing 12s linear infinite reverse;
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }

    /* ── Brand eyebrow ── */
    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp .8s .3s ease forwards;
    }

    /* ── Main heading ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: .3rem;
      opacity: 0;
      animation: fadeUp .9s .5s ease forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    /* ── Divider ── */
    .rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.4rem 0;
      opacity: 0;
      animation: fadeUp .7s .7s ease forwards;
    }
    .rule-line {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .rule-line + .rule-line { background: linear-gradient(90deg, var(--gold), transparent); }
    .rule-dot {
      width: 4px; height: 4px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* ── Subtitle ── */
    .sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 200;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp .7s .85s ease forwards;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp .8s 1s ease forwards;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .cd-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      font-weight: 600;
      color: #fff;
      line-height: 1;
      width: clamp(70px, 8vw, 100px);
      text-align: center;
      position: relative;
    }
    /* gold bottom border on number */
    .cd-num::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px; height: 1px;
      background: var(--gold);
    }
    .cd-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(212,175,55,.6);
      margin-top: 6px;
    }
    .cd-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: rgba(212,175,55,.3);
      line-height: 1;
      align-self: flex-start;
      padding-top: 4px;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.6rem;
      font-family: 'Montserrat', sans-serif;
      font-size: .52rem;
      font-weight: 200;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: rgba(255,255,255,.18);
      z-index: 3;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .countdown { gap: .8rem; }
      .cd-sep { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>
  <div class="glow"></div>

  <div class="wrap">

    <!-- Medallion -->
    <div class="medallion">
      <img src="../project/public/logo.jpg" alt="" onerror="this.style.display='none'" />
    </div>

    <p class="eyebrow">Villa Safira &nbsp;·&nbsp; Vacation Home</p>

    <h1>Under <em>Construction</em></h1>

    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-dot"></div>
      <div class="rule-dot" style="opacity:.3;transform:rotate(45deg) scale(.55)"></div>
      <div class="rule-dot"></div>
      <div class="rule-line"></div>
    </div>

    <p class="sub">Something extraordinary is on its way</p>

    <!-- Countdown -->
    <div class="countdown">
      <div class="cd-block">
        <div class="cd-num" id="cd-d">00</div>
        <div class="cd-label">Days</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <div class="cd-num" id="cd-h">00</div>
        <div class="cd-label">Hours</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <div class="cd-num" id="cd-m">00</div>
        <div class="cd-label">Minutes</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <div class="cd-num" id="cd-s">00</div>
        <div class="cd-label">Seconds</div>
      </div>
    </div>

  </div>

  <footer>© 2025 Villa Safira &nbsp;·&nbsp; All rights reserved</footer>

  <script>
    /* ── Countdown ── fixed launch date, same for all visitors ── */
    const target = new Date('2026-05-28T00:00:00').getTime();

    function tick() {
      const diff = target - Date.now();
      const pad = n => String(Math.max(0, n)).padStart(2, '0');
      if (diff <= 0) {
        ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
        return;
      }
      document.getElementById('cd-d').textContent = pad(Math.floor(diff / 86400000));
      document.getElementById('cd-h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('cd-m').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('cd-s').textContent = pad(Math.floor((diff % 60000) / 1000));
    }
    tick(); setInterval(tick, 1000);

    /* ── Particles ── */
    const cv = document.getElementById('c');
    const cx = cv.getContext('2d');
    let W, H, pts;
    const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
    window.addEventListener('resize', () => { resize(); init(); });
    resize();
    const rand = (a,b) => a + Math.random()*(b-a);
    function init() {
      pts = Array.from({length: Math.floor(W*H/12000)}, () => ({
        x: rand(0,W), y: rand(0,H),
        vx: rand(-.12,.12), vy: rand(-.22,-.03),
        r: rand(.4,1.6), a: rand(.05,.3)
      }));
    }
    init();
    (function loop() {
      cx.clearRect(0,0,W,H);
      for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -4) { p.y = H+4; p.x = rand(0,W); }
        if (p.x < -4) p.x = W+4;
        if (p.x > W+4) p.x = -4;
        cx.beginPath();
        cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        cx.fillStyle = `rgba(212,175,55,${p.a})`;
        cx.fill();
      }
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
